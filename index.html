<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge-1 Simple Landing Page with Html and CSS</title>
    <link rel="stylesheet" href="./css/style.css" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="row-wrapper desktop-header">
        <div class="row-content">
          <div class="content-group">
            <div class="logo">
              <span>INVITATION.</span>
            </div>
            <nav>
              <ul>
                <li>
                  <a href="#about">About</a>
                </li>
                <li>
                  <a href="#catalog">Catalog</a>
                </li>
                <li>
                  <a href="#service">Our Service</a>
                </li>
                <li>
                  <a href="#">Contact Us</a>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </div>

      <div class="row-wrapper mobile-header">
        <div class="row-content">
          <div class="content-group">
            <div class="logo">
              <span>INVITATION.</span>
            </div>

            <input class="menu-btn" type="checkbox" id="menu-btn" />
            <label class="menu-icon" for="menu-btn"
              ><span class="navicon"></span
            ></label>

            <nav class="menu">
              <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#catalog">Catalog</a></li>
                <li><a href="#service">Our Service</a></li>
                <li><a href="#">Contact Us</a></li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </header>

    <main>
      <!-- Hero Section -->
      <section id="about" class="about-container">
        <div class="row-wrapper">
          <div class="row-content">
            <div class="hero-content">
              <div class="hero-text">
                <div class="hero-title">
                  <h1>Rayakan Momen Spesial dengan Undangan Tanpa Ribet</h1>
                  <p>
                    Dengan INVITATION, ciptakan, sesuaikan, dan bagikan momen
                    spesialmu melalui undangan digital
                  </p>
                </div>
                <div class="hero-btn">
                  <a href="#">
                    <span>Let's Talk</span>
                  </a>
                </div>
              </div>
              <div class="hero-img">
                <img
                  src="./assets/undangan-online-mockup.png"
                  alt="Hero image"
                />
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- End Hero Section -->
       
    </main>
  </body>
</html>
